# 1. Database Connection Details
spring.datasource.url=jdbc:mysql://localhost:3306/quantitymeasurement
spring.datasource.username=root
spring.datasource.password=root

# 2. JPA & Hibernate Settings
# 'update' automatically creates or updates your database tables based on your Java classes.
# Note: Use 'update' or 'create' for development, but 'validate' or 'none' in production!
spring.jpa.hibernate.ddl-auto=update

# Show the actual SQL queries Hibernate generates in your console (great for debugging)
spring.jpa.show-sql=true

